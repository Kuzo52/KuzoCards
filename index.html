<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>KuzoCards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=11">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="welcome" id="welcome" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle">
    <div class="welcome__glow" aria-hidden="true"></div>
    <p class="welcome__brand">KuzoCards</p>
    <h2 class="welcome__title" id="welcomeTitle">Добро пожаловать!</h2>
    <p class="welcome__text">Карточная игра для компании.&nbsp;Свайпай и&nbsp;играй.</p>
    <button type="button" class="welcome__btn" id="welcomeBtn">Начать</button>
  </div>

  <div class="modes" id="modes" hidden role="dialog" aria-modal="true" aria-labelledby="modesTitle">
    <div class="modes__glow" aria-hidden="true"></div>
    <p class="welcome__brand">KuzoCards</p>
    <h2 class="welcome__title welcome__title--sm" id="modesTitle">Выбери режим</h2>
    <p class="welcome__text">Колода под возраст компании</p>
    <div class="modes__list">
      <button type="button" class="mode-card" data-mode="kids">
        <span class="mode-card__age">8+</span>
        <span class="mode-card__name">Детский</span>
        <span class="mode-card__desc">Весёлые задания без взрослого юмора</span>
      </button>
      <button type="button" class="mode-card" data-mode="teens">
        <span class="mode-card__age">14+</span>
        <span class="mode-card__name">Подростковый</span>
        <span class="mode-card__desc">Драйв, мемы и&nbsp;лёгкий стёб</span>
      </button>
      <button type="button" class="mode-card" data-mode="adults">
        <span class="mode-card__age">18+</span>
        <span class="mode-card__name">Взрослый</span>
        <span class="mode-card__desc">Острые вопросы и&nbsp;ночной юмор</span>
      </button>
    </div>
  </div>

  <header class="topbar">
    <button type="button" class="btn-mode" id="btnMode" hidden aria-label="Сменить режим">
      <span class="btn-mode__label" id="modeBadge"></span>
      <span class="btn-mode__action">сменить</span>
    </button>
    <div class="topbar__actions">
      <p class="counter" id="counter" aria-live="polite">0</p>
      <button type="button" class="btn-reset" id="btnReset" aria-label="Сбросить прогресс">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="stage">
    <h1 class="brand">KuzoCards</h1>
    <section class="deck" id="deck" aria-label="Стопка карточек">
      <p class="deck__empty" id="deckEmpty" hidden>Колода пуста.&nbsp;Сбрось прогресс и&nbsp;начинай снова.</p>
    </section>
    <p class="hint">
      <span>свайп вправо — выполнено</span>
      <span>влево — пропуск</span>
    </p>
  </main>

  <footer class="footer">
    <p>Made by <a href="https://t.me/kuzoceo" target="_blank" rel="noopener noreferrer">@kuzoceo</a></p>
  </footer>

  <script src="script.js?v=11" defer></script>
</body>
</html>
